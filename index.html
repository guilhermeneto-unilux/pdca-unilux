<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unilux | Auditoria e Eficácia</title>
  <meta name="description" content="Sistema PDCA de auditoria e eficácia — Unilux" />

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Config & Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── LOGIN OVERLAY ─────────────────────────────── -->
<div id="login-overlay">
  <div class="login-card fade-in">
    <div class="login-brand-box">unilux</div>
    <div class="login-overline">PDCA</div>
    <h1 class="login-title">Acesso ao sistema</h1>
    <p class="login-hint">Informe suas credenciais para continuar.</p>

    <div id="login-error"></div>

    <form class="login-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-user">Usuário</label>
        <input class="form-control" id="login-user" type="text" placeholder="seu.usuario" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pass">Senha</label>
        <input class="form-control" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="login-btn" style="margin-top:8px;">
        ENTRAR
      </button>
    </form>
  </div>
</div>

<!-- ── APP SHELL ──────────────────────────────────── -->
<div id="app" style="display:none;">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-box">unilux</div>
      <div class="sidebar-tagline">Auditoria e Eficácia</div>
    </div>

    <span class="sidebar-nav-label">Visão Geral</span>
    <button class="nav-btn" data-page="visao-geral" id="nav-visao-geral">
      <span>📊</span> Acompanhamento
    </button>

    <span class="sidebar-nav-label" style="margin-top:4px;">Auditoria</span>
    <button class="nav-btn" data-page="auditoria" id="nav-auditoria">
      <span>📋</span> Projetos
    </button>
    <button class="nav-btn" data-page="gestao" id="nav-gestao">
      <span>➕</span> Nova auditoria
    </button>

    <span class="sidebar-nav-label" style="margin-top:4px;">Gestão</span>
    <button class="nav-btn" data-page="indicadores" id="nav-indicadores">
      <span>📈</span> Indicadores Globais
    </button>
    <button class="nav-btn" data-page="historico" id="nav-historico">
      <span>🕒</span> Histórico Completo
    </button>

    <span class="sidebar-nav-label" style="margin-top:4px;">Configurações</span>
    <button class="nav-btn" data-page="sistema" id="nav-sistema">
      <span>⚙️</span> Sistema e Permissões
    </button>

    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
    <button class="sidebar-logout" id="logout-btn">Sair</button>
  </nav>

  <!-- Main Content -->
  <main id="main">
    <div class="page-content fade-in" id="page-container">
      <div class="loading-state"><div class="spinner"></div> Carregando...</div>
    </div>
  </main>

</div>

<!-- ── SCRIPTS ─────────────────────────────────────── -->
<script src="config.js?v=2"></script>
<script src="supabase.js?v=2"></script>
<script src="auth.js?v=2"></script>
<script src="data.js?v=2"></script>
<script src="pages/visao-geral.js?v=2"></script>
<script src="pages/auditoria.js?v=2"></script>
<script src="pages/gestao.js?v=2"></script>
<script src="pages/realizar.js?v=2"></script>
<script src="pages/indicadores.js?v=2"></script>
<script src="pages/historico.js?v=2"></script>
<script src="pages/sistema.js?v=2"></script>
<script src="app.js?v=2"></script>

</body>
</html>
