# ==================================================
# .github/workflows/deploy.yml
# Deploy automático para GitHub Pages
# A cada push na branch main, o site é publicado
# ==================================================

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injetar credenciais Supabase no config.js
        run: |
          sed -i \
            -e 's|https://SEU_PROJETO.supabase.co|${{ secrets.SUPABASE_URL }}|g' \
            -e 's|SUA_ANON_KEY_AQUI|${{ secrets.SUPABASE_KEY }}|g' \
            config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
